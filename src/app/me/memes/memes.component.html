<div class="memes-grid">
  <img src="/images/global/troll.svg" class="loading-face" />
  
  @for (column of columns(); track $index) {
    <div class="memes-column">
      @for (meme of column; track meme) {
        <article class="meme-card">
          <a class="meme-link" [href]="meme" target="_blank" rel="noopener noreferrer">
            <img [src]="meme" alt="MEME!!" />
          </a>
        </article>
      }
    </div>
  }
</div>

<div class="container" (click)="$event.stopPropagation()">
    <header>
         <div>
            <img src="./images/icons/camera.svg" alt="Camera" />
        </div>
        <nav>
            <div [class.selected]="mediaMode() === 'image'" (click)="toggleMediaMode('image')">
                <svg width="24px" height="24px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 11C9.10457 11 10 10.1046 10 9C10 7.89543 9.10457 7 8 7C6.89543 7 6 7.89543 6 9C6 10.1046 6.89543 11 8 11Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M6.56055 21C12.1305 8.89998 16.7605 6.77998 22.0005 14.63" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M18 3H6C3.79086 3 2 4.79086 2 7V17C2 19.2091 3.79086 21 6 21H18C20.2091 21 22 19.2091 22 17V7C22 4.79086 20.2091 3 18 3Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <div [class.selected]="mediaMode() === 'video'" (click)="toggleMediaMode('video')">
                <svg width="24px" height="24px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 3H6C3.79086 3 2 4.79086 2 7V17C2 19.2091 3.79086 21 6 21H18C20.2091 21 22 19.2091 22 17V7C22 4.79086 20.2091 3 18 3Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M10.28 8.03994C9.19003 8.42994 9 10.5199 9 12.0399C9 13.5599 9.19003 15.5999 10.28 16.0399C11.37 16.4799 16 13.7499 16 12.0399C16 10.3299 11.44 7.61994 10.28 8.03994Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
        </nav>
    </header>
    <div class="content" #content (scroll)="onContentScroll($event)">
        @for (post of displayedPosts(); track $index) {
            <div class="gram-item" [class.is-video]="post.attached.type === 'video'">
                <div class="gram-item-wrapper">
                    @if (post.attached.type === 'video') {
                        <video
                            [src]="post.attached.url"
                            muted
                            loop
                            playsinline
                            autoplay
                        ></video>
                    } @else {
                        <a [href]="post.attached.url" target="_blank" rel="noopener noreferrer">
                            <img [src]="post.attached.url" [alt]="post.title" loading="lazy" />
                        </a>
                    }
                </div>
                <div class="gram-item-title">{{ post.title }}</div>
            </div>
        }

        @if (allPosts().length === 0) {
            <div class="empty">
                <p>No {{mediaMode()}} posts found.</p>
            </div>
        }
    </div>
</div>

name: Build Website

on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ 'main' ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  SITE_URL: https://www.strong.scot/
  FEED_BASE_PATH: /feed/rants/

jobs:
  generate:
    name: Generate Feed and Routes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - name: Set up Python 3.11
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Feed Dependencies
        run: pip install -r feed/requirements.txt --require-hashes --no-deps
      - name: Generate Feed
        run: python feed/feed.py
      - name: Generate Routes
        run: python ./scripts/build-routes.py > routes.txt
      - name: Upload routes artifact
        uses: actions/upload-artifact@0b2256b8c012f0828dc542b3febcab082c67f72b
        with:
          name: routes
          path: routes.txt
      - name: Upload feed artifact
        uses: actions/upload-artifact@0b2256b8c012f0828dc542b3febcab082c67f72b
        with:
          name: feed-build
          path: feed/build

  build:
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: routes
          merge-multiple: true
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: feed-build
          path: feed/build
      - name: Setup Node.js 22
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8
        with:
          node-version: 22.4.1
          cache: 'npm'
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
      - name: Build
        run: npm run ng run strong.scot:build:production
      - name: Copy generated feed into site
        run: |
          mkdir -p ./dist/strong.scot/browser/feed/rants
          cp -R ./feed/build/rants/* ./dist/strong.scot/browser/feed/rants/
          cp feed/index.html ./dist/strong.scot/browser/feed/index.html
          cp -R feed/static ./dist/strong.scot/browser/feed/static
      - name: Create 404
        run: cp ./dist/strong.scot/browser/index.html ./dist/strong.scot/browser/404.html
      - name: Upload to GitHub Artifacts
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: ./dist/strong.scot/browser

  deploy:
    if: (github.event_name == 'push' && github.ref_name == 'main') || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
